name: iOS

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: xcodebuild -scheme SignForge -destination 'platform=iOS Simulator,name=iPhone 16' build
