name: iOS

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build simulator
        run: xcodebuild -scheme SignForge -destination 'platform=iOS Simulator,name=iPhone 17' build
      - name: Build unsigned device app
        run: |
          xcodebuild build \
            -scheme SignForge \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Package unsigned IPA
        run: |
          APP_PATH="$PWD/build/DerivedData/Build/Products/Release-iphoneos/SignForge.app"
          test -d "$APP_PATH"
          mkdir -p "$PWD/build/Payload"
          cp -R "$APP_PATH" "$PWD/build/Payload/"
          cd "$PWD/build"
          zip -qry SignForge-unsigned-ios26-device.ipa Payload
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SignForge-unsigned-ios26-device-ipa
          path: build/SignForge-unsigned-ios26-device.ipa
          if-no-files-found: error
